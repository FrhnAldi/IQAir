name: Auto Scraper IQAir

on:
  schedule:
    # Berjalan otomatis setiap jam (kamu bisa sesuaikan dengan cron format)
    # Catatan: GitHub menggunakan zona waktu UTC.
    - cron: '0 * * * *'
  workflow_dispatch: # Tombol manual untuk mengetes script kapan saja via web GitHub

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    # 1. Ambil kode dari repositori
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Siapkan Python di server Cloud GitHub
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install library yang dibutuhkan
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    # 4. Jalankan script scraper
    - name: Run scraping script
      run: python scraper.py

    # 5. Commit dan Push kembali file CSV yang ter-update ke repositori kamu
    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add iqair_data.csv
        git commit -m "Auto-update data AQI: $(date)" || echo "Tidak ada perubahan data"
        git push